<!DOCTYPE html>
<html>

<head>
    <title>Passport Photo Result</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="container result-container">

    <h1>Professional Passport Sheet</h1>

    <img src="{{ url_for('static', filename=image) }}"
         class="result-image">

    <br><br>

    <!-- Download Button -->
    <a href="{{ url_for('static', filename=image) }}"
       download>
        <button>
            Download HD Sheet
        </button>
    </a>

    <br><br>

    <!-- Print Button -->
    <button onclick="printPhoto()">
        Print Passport Sheet
    </button>

</div>

<script>

function printPhoto() {

    let imageUrl =
        "{{ url_for('static', filename=image) }}";

    let printWindow =
        window.open('', '_blank');

    printWindow.document.write(`
        <html>
        <head>

            <title>Print Passport Sheet</title>

            <style>

                @page {
                    size: 4in 6in;
                    margin: 0;
                }

                body{
                    margin:0;
                    padding:0;
                    text-align:center;
                    background:white;
                }

                img{
                    width:100%;
                    height:auto;
                }

            </style>

        </head>

        <body>

            <img src="${imageUrl}">

            <script>

                window.onload = function(){

                    window.focus();

                    window.print();

                }

            <\/script>

        </body>

        </html>
    `);

    printWindow.document.close();
}

</script>

</body>
</html>
